spring.application.name=ecommerce-backend
server.port=8080

# H2 file-based database (persists after restart)
spring.datasource.url=jdbc:h2:file:./data/ecommerce
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 console available at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Brevo HTTP API — no SMTP, works on Railway
brevo.api.key=${BREVO_API_KEY:}
brevo.sender.email=${BREVO_SENDER_EMAIL:noreply@shopeasy.com}

# Frontend URL used in verification email links
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
